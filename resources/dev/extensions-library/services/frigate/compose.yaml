name: frigate

services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:0.15.0
    container_name: dream-frigate
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    shm_size: "128mb"
    ports:
      - "${FRIGATE_PORT:-8971}:5000"
      - "${FRIGATE_RTSP_PORT:-8554}:8554"
      - "${FRIGATE_WEBRTC_PORT:-8555}:8555/tcp"
      - "${FRIGATE_WEBRTC_PORT:-8555}:8555/udp"
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD:-}
    volumes:
      - ./data/frigate/config:/config
      - ./data/frigate/storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  dream-network:
    external: true
