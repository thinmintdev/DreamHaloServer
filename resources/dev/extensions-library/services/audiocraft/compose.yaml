name: audiocraft

services:
  audiocraft:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dream-audiocraft
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    volumes:
      - ./data/audiocraft:/app/outputs:rw
      - ./data/audiocraft/models:/root/.cache/audiocraft:rw
    ports:
      - "${AUDIOCRAFT_PORT:-7860}:7860"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '1.0'
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  dream-network:
    external: true

