services:
  ollama:
    image: ollama/ollama:0.5.7@sha256:8430bdb513d5dbd85294fb70ea7e1f88ee0aaf9756585ca4dbaf080a773dc774
    container_name: dream-ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${OLLAMA_PORT:-7804}:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network

networks:
  dream-network:
    external: true
