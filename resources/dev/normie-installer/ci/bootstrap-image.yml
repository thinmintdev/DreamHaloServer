name: Bootstrap Image

on:
  push:
    branches: [main]
    paths:
      - "dream-server/bootstrap/**"
  pull_request:
    branches: [main]
    paths:
      - "dream-server/bootstrap/**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push bootstrap image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.release.version' dream-server/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Dream Server version: $VERSION"

      - name: Set up QEMU (for arm64 cross-compile)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dream-server/bootstrap
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/light-heart-labs/dream-bootstrap:latest
            ghcr.io/light-heart-labs/dream-bootstrap:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=DreamServer Bootstrap
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/Light-Heart-Labs/DreamServer
