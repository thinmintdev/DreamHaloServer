name: Build Windows Installer

on:
  push:
    branches: [main]
    paths:
      - "dream-server/installers/normie/dreamserver-setup.ps1"
      - "dream-server/installers/normie/dreamserver-setup.bat"
      - "dream-server/installers/normie/windows/**"
  pull_request:
    branches: [main]
    paths:
      - "dream-server/installers/normie/**"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write   # Needed to create releases
  packages: read

jobs:
  build:
    name: Build DreamServer-Setup.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.release.version' dream-server/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Dream Server version: $VERSION"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Add NSIS to PATH
          $env:Path += ";C:\Program Files (x86)\NSIS"
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        working-directory: dream-server/installers/normie/windows
        run: |
          makensis dreamserver-setup.nsi
          if (-not (Test-Path "DreamServer-Setup.exe")) {
            Write-Host "ERROR: DreamServer-Setup.exe was not created" -ForegroundColor Red
            exit 1
          }
          $size = (Get-Item "DreamServer-Setup.exe").Length / 1KB
          Write-Host "Built DreamServer-Setup.exe ($([math]::Round($size)) KB)" -ForegroundColor Green

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DreamServer-Setup-${{ steps.version.outputs.version }}
          path: dream-server/installers/normie/windows/DreamServer-Setup.exe
          retention-days: 90

      # On push to main, also attach to the latest GitHub Release
      - name: Upload to latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find latest release (if any)
          RELEASE=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$RELEASE" ]; then
            echo "Uploading to release: $RELEASE"
            gh release upload "$RELEASE" \
              "dream-server/installers/normie/windows/DreamServer-Setup.exe" \
              --clobber
          else
            echo "No release found. Artifact is available as a workflow artifact."
          fi
