name: Lint Normie Installers

on:
  push:
    branches: [main]
    paths:
      - "dream-server/installers/normie/**"
  pull_request:
    branches: [main]
    paths:
      - "dream-server/installers/normie/**"

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (Linux + macOS scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          echo "=== Linting normie shell scripts ==="

          # Lint Linux installer
          echo "--- dreamserver-install.sh ---"
          shellcheck \
            --exclude=SC1091,SC2034 \
            --severity=error \
            dream-server/installers/normie/dreamserver-install.sh

          # Lint macOS installer
          echo "--- DreamServer-Install.command ---"
          shellcheck \
            --exclude=SC1091,SC2034 \
            --severity=error \
            dream-server/installers/normie/DreamServer-Install.command

          # Lint bootstrap entrypoint
          echo "--- bootstrap/entrypoint.sh ---"
          shellcheck \
            --exclude=SC1091,SC2034 \
            --severity=error \
            dream-server/bootstrap/entrypoint.sh

          echo ""
          echo "All scripts passed ShellCheck"

  psscriptanalyzer:
    name: PSScriptAnalyzer (Windows script)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

          Write-Host "=== Linting dreamserver-setup.ps1 ==="
          $results = Invoke-ScriptAnalyzer `
            -Path dream-server/installers/normie/dreamserver-setup.ps1 `
            -Severity Error,Warning `
            -ExcludeRule PSAvoidUsingWriteHost

          if ($results) {
            $results | Format-Table -AutoSize
            $errors = $results | Where-Object { $_.Severity -eq 'Error' }
            if ($errors) {
              Write-Host "Found $($errors.Count) error(s)" -ForegroundColor Red
              exit 1
            } else {
              Write-Host "Warnings found but no errors — passing" -ForegroundColor Yellow
            }
          } else {
            Write-Host "No issues found" -ForegroundColor Green
          }
