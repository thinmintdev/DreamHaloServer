model_list:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_base: http://cliproxyapi:8317/v1
      api_key: dummy

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_base: http://cliproxyapi:8317/v1
      api_key: dummy

  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_base: http://cliproxyapi:8317/v1
      api_key: dummy

  - model_name: local
    litellm_params:
      model: openai/default
      api_base: http://llama-server:8080/v1
      api_key: not-needed

  - model_name: default
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_base: http://cliproxyapi:8317/v1
      api_key: dummy

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  fallbacks:
    - claude-sonnet-4-6:
        - local

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  stream_timeout: 60
