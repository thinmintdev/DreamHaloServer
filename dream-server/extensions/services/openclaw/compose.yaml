services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.8
    container_name: dream-openclaw
    restart: unless-stopped
    user: root
    security_opt:
      - seccomp:unconfined
    environment:
      - HOME=/home/node
      - PLAYWRIGHT_CHROMIUM_SANDBOX=false
      - OPENCLAW_CONFIG=/config/openclaw-dreamhalo.json
      - OPENCLAW_DATA=/data
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN:?Set OPENCLAW_TOKEN in .env}
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD:-dreamhalo}
      - LLM_MODEL=${LLM_MODEL:-qwen3:30b-a3b}
      - BOOTSTRAP_MODEL=${BOOTSTRAP_MODEL:-qwen3:8b-q4_K_M}
      - OLLAMA_URL=${LLM_API_URL:-http://llama-server:8080}
      - OPENCLAW_LLM_URL=${OPENCLAW_LLM_URL:-}
      - OPENCLAW_HTTP_API=${OPENCLAW_HTTP_API:-}
      - LITELLM_KEY=${LITELLM_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - SEARXNG_BASE_URL=http://searxng:8080
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - PERPLEXICA_URL=http://perplexica:3000
      - WHISPER_URL=http://whisper:8000
      - KOKORO_URL=http://tts:8880
      - COMFYUI_URL=http://comfyui:8188
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD:-dreamhalo}
    entrypoint: ["/bin/sh", "-c", "/config/install-browser.sh; node /config/inject-token.js; export OPENCLAW_CONFIG=/tmp/openclaw-config.json; exec docker-entrypoint.sh node openclaw.mjs gateway --allow-unconfigured --bind lan"]
    volumes:
      - ./config/openclaw:/config:ro
      - ./data/openclaw:/data
      - ./data/openclaw/home:/home/node/.openclaw
      - ./config/openclaw/workspace:/home/node/.openclaw/workspace
      - ./config/openclaw/workspace-mintops:/home/node/.openclaw/workspace-mintops
      - ./config/openclaw/workspace/ssh:/home/node/.ssh
      - ./data/openclaw/gogcli:/home/node/.config/gogcli
      - ./data/openclaw/playwright:/home/node/.cache/ms-playwright
    ports:
      - "0.0.0.0:${OPENCLAW_PORT:-7860}:18789"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$OPENCLAW_HTTP_API\" = 'true' ]; then wget -qO- http://127.0.0.1:18790/v1/models || exit 1; else wget -qO- http://127.0.0.1:18789/ || exit 1; fi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Route Open WebUI through LiteLLM so all models (local + Claude) are available
  open-webui:
    environment:
      - OPENAI_API_BASE_URLS=http://litellm:4000/v1;http://openclaw:18790/v1
      - OPENAI_API_KEYS=${LITELLM_KEY:-};${OPENCLAW_TOKEN:-}
