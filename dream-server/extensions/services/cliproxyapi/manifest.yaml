schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: cliproxyapi
  name: "CLI Proxy API (Claude/Gemini/OpenAI Proxy)"
  aliases: []
  container_name: dream-cliproxyapi
  default_host: cliproxyapi
  port: 8317
  external_port_env: CLIPROXYAPI_PORT
  external_port_default: 8317
  health: /v1/models
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  env_vars: []
