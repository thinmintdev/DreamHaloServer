schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: dozzle
  name: Dozzle (Live Logs)
  aliases: [logs, log-viewer]
  container_name: dream-dozzle
  default_host: dozzle
  port: 8080
  external_port_env: DOZZLE_PORT
  external_port_default: 9999
  health: /healthcheck
  ui_path: /
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: recommended
  depends_on: []
