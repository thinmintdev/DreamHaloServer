services:
  9router:
    image: ghcr.io/thinmintdev/9router:latest
    container_name: dream-9router
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NINEROUTER_API_KEY=${NINEROUTER_API_KEY:-}
    ports:
      - "0.0.0.0:${NINEROUTER_PORT:-8082}:8082"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
