schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: proxmox-mcp
  name: Proxmox MCP
  aliases: [pve-mcp]
  container_name: dream-proxmox-mcp
  default_host: proxmox-mcp
  port: 8811
  external_port_env: PROXMOX_MCP_PORT
  external_port_default: 8811
  health: /sse
  type: docker
  compose_file: compose.yaml
  gpu_backends: [amd, nvidia, none]
  category: optional
  depends_on: []
