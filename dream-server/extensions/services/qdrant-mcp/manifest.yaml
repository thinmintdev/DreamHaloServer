schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: qdrant-mcp
  name: Qdrant MCP
  aliases: [qdrant-mcp, vector-mcp]
  container_name: dream-qdrant-mcp
  default_host: qdrant-mcp
  port: 8812
  external_port_env: QDRANT_MCP_PORT
  external_port_default: 8812
  health: /mcp
  type: docker
  compose_file: compose.yaml
  gpu_backends: [amd, nvidia, none]
  category: optional
  depends_on: [qdrant, litellm]
