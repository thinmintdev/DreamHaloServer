schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: beszel
  name: Beszel (System Monitor)
  aliases: [monitoring, metrics]
  container_name: dream-beszel
  default_host: beszel
  port: 8090
  external_port_env: BESZEL_PORT
  external_port_default: 8090
  health: /
  ui_path: /
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: recommended
  depends_on: []
