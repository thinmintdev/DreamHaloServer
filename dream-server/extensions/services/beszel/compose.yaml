services:
  beszel:
    image: henrygd/beszel:latest
    container_name: dream-beszel
    restart: unless-stopped
    ports:
      - "0.0.0.0:${BESZEL_PORT:-8090}:8090"
    volumes:
      - ./data/beszel:/beszel_data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
